services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greenhouse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto:/mosquitto/config
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u backend -P mqtt_secret -t '$$SYS/broker/uptime' -C 1 -W 3"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/greenhouse
      SECRET_KEY: ${SECRET_KEY:-changeme}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_USERNAME: backend
      MQTT_PASSWORD: mqtt_secret
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
