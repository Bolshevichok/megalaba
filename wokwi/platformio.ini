[platformio]
default_envs = full-greenhouse

; ============================================================
; Shared settings
; ============================================================
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

; ============================================================
; Device types (templates)
; Each type defines which sensors/actuators are compiled in.
; To create a new INSTANCE, add -DDEVICE_ID=N to build_flags.
;
; Example: build device-2 of type climate-sensor:
;   pio run -e climate-sensor -a build_flags="-DDEVICE_ID=2"
; ============================================================

[env:climate-sensor]
build_flags = -DTYPE_CLIMATE_SENSOR -DDEVICE_ID=4

[env:light-controller]
build_flags = -DTYPE_LIGHT_CONTROLLER -DDEVICE_ID=1

[env:full-greenhouse]
build_flags = -DTYPE_FULL_GREENHOUSE -DDEVICE_ID=1
